<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #3a7d2c; --green-light: #5aab3f;
  --steel: #2c3e50; --muted: #6b7280; --bg: #f9fafb;
  --white: #ffffff; --border: #e5e7eb;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
}
body { font-family: var(--sans); background: var(--bg); color: var(--steel); line-height: 1.7; }
a { text-decoration: none; }
nav { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 68px; }
.nav-logo img { height: 46px; display: block; }
.nav-back { color: var(--muted); font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: color .2s; }
.nav-back:hover { color: var(--green); }
.page-header { background: linear-gradient(135deg, #2c3e50 0%, #1a2c40 100%); color: #fff; padding: 48px 2rem; }
.page-header-inner { max-width: 760px; margin: 0 auto; }
.page-header h1 { font-family: var(--serif); font-size: 2.2rem; color: #fff; margin-bottom: 8px; }
.page-header p { color: rgba(255,255,255,0.6); font-size: 14px; }
.content { max-width: 760px; margin: 0 auto; padding: 56px 2rem; }
.content .itrk-legaltext { font-size: 15px; line-height: 1.8; color: var(--steel); }
.content .itrk-legaltext h2 { font-family: var(--serif); font-size: 1.4rem; margin: 32px 0 12px; color: var(--steel); }
.content .itrk-legaltext h3 { font-size: 1.1rem; font-weight: 600; margin: 24px 0 8px; color: var(--steel); }
.content .itrk-legaltext p { margin-bottom: 12px; }
.content .itrk-legaltext a { color: var(--green); }
footer { background: #0a141f; color: rgba(255,255,255,0.45); padding: 28px 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; font-size: 13px; margin-top: 48px; }
footer a { color: rgba(255,255,255,0.45); }
footer a:hover { color: rgba(255,255,255,0.85); }
.footer-links { display: flex; gap: 28px; }
</style>
